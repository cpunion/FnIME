name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Swift Version
        run: swift --version

      - name: Resolve Dependencies
        run: swift package resolve

      - name: Build
        run: swift build -c release

      - name: Test
        run: |
          if [ -d Tests ]; then
            swift test
          else
            echo "No Tests/ directory, skipping tests."
          fi
